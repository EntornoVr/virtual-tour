<!DOCTYPE html>
<html lang="es">
<head>
    <title>Prime Padel - Tour Virtual 360</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #panorama { width: 100vw; height: 100vh; }
        /* Estilo para que el título flote sobre el panorama */
        .overlay-title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="overlay-title">
        <h1>PRIME PADEL</h1>
    </div>

    <div id="panorama"></div>

    <script>
        pannellum.viewer('panorama', {
            "default": {
                "firstScene": "escena1",
                "author": "Entorno VR",
                "sceneFadeDuration": 1000,
                "autoLoad": true,
                "motionControls": true
            },

            "scenes": {
                "escena1": {
                    "title": "Pista Central - Inicio",
                    "type": "equirectangular",
                    "panorama": "P01.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Ir a Escena 2", "sceneId": "escena2" }
                    ]
                },
                "escena2": {
                    "title": "Entrada",
                    "type": "equirectangular",
                    "panorama": "02.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver a Inicio", "sceneId": "escena1" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Ir a Escena 3", "sceneId": "escena3" }
                    ]
                },
                "escena3": {
                    "title": "Cancha abierta",
                    "type": "equirectangular",
                    "panorama": "03.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena2" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena4" }
                    ]
                },
                "escena4": {
                    "title": "Snack",
                    "type": "equirectangular",
                    "panorama": "04.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena3" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena5" }
                    ]
                },
                "escena5": {
                    "title": "Canchas cerradas",
                    "type": "equirectangular",
                    "panorama": "05.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena4" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena6" }
                    ]
                },
                "escena6": {
                    "title": "Cancha cerrada 1",
                    "type": "equirectangular",
                    "panorama": "06.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena5" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena7" }
                    ]
                },
                "escena7": {
                    "title": "Entrada al privado",
                    "type": "equirectangular",
                    "panorama": "07.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena6" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena8" }
                    ]
                },
                "escena8": {
                    "title": "Zona Privada Climatizada",
                    "type": "equirectangular",
                    "panorama": "08.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena7" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena9" }
                    ]
                },
                "escena9": {
                    "title": "Baños y Regaderas",
                    "type": "equirectangular",
                    "panorama": "09.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver", "sceneId": "escena8" },
                        { "pitch": -5, "yaw": 0, "type": "scene", "text": "Siguiente", "sceneId": "escena10" }
                    ]
                },
                "escena10": {
                    "title": "Sport Bar",
                    "type": "equirectangular",
                    "panorama": "10.jpg",
                    "hotSpots": [
                        { "pitch": -5, "yaw": 180, "type": "scene", "text": "Volver a Escena 9", "sceneId": "escena9" }
                    ]
                }
            }
        });
    </script>
</body>
</html>
